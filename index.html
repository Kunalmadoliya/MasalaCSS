<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KunalCSS Engine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">KunalCSS</div>
    <button class="theme-toggle">Toggle</button>
  </nav>

  <!-- Main -->
  <div class="container">

    <!-- Editor -->
    <div class="card editor">
      <div class="card-header">Editor</div>
      <textarea id="text-area" placeholder="kunal-p-4 kunal-bg-red kunal-c-white"></textarea>
    </div>

    <!-- Preview -->
    <div class="card preview">
      <div class="card-header">Preview</div>
      <div class="preview-box">
        <div id="preview" class="preview-content">Box</div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
